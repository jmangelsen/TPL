runConfig:
  runtime: nodejs20

env:
  - variable: VITE_MAPBOX_TOKEN
    secret: VITE_MAPBOX_TOKEN
    availability:
      - BUILD
      - RUNTIME

  - variable: NEWSAPI_API_KEY
    secret: NEWSAPI_API_KEY
    availability:
      - RUNTIME

  - variable: SMTP_USER
    secret: SMTP_USER
    availability:
      - RUNTIME

  - variable: SMTP_PASS
    secret: SMTP_PASS
    availability:
      - RUNTIME
